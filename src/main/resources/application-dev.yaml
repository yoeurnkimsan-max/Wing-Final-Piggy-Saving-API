spring:
  application:
    name: Piggy-Saving

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
      enabled: true

server:
  tomcat:
    max-http-form-post-size: 104857600
    max-swallow-size: 104857600
    max-connections: 200
    threads:
      max: 200